<header>
  <div class="topo">
    <div class="logo">Vila das Flores</div>
    <div class="area-usuario">

  <button *ngIf="!usuarioLogado"
          class="login"
          routerLink="/login">
    LOGIN
  </button>

  <div *ngIf="usuarioLogado" class="usuario-logado">

    <div class="perfil-logado">
      <img
        src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
        alt="Perfil"
        class="foto-perfil"
      >

      <span>{{ usuarioLogado.nome }}</span>
    </div>

    <button class="btn-logout" (click)="logout()">
      Logout
    </button>

  </div>

</div>
  </div>
    
  <nav>
    <a routerLink="/">Início</a>
    <a routerLink="/loja">Loja</a>
    <a *ngIf="isLojista()" routerLink="/produtos">Gerenciar Produtos</a>
    <a routerLink="/contatos">Contatos</a>
  </nav>
</header>
<router-outlet></router-outlet>
