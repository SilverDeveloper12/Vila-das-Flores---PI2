<div class="container">
  <h2>Cadastro Lojista</h2>

  <input placeholder="Nome do proprietário" [(ngModel)]="novoUsuario.nome" maxlength="100">
  <input placeholder="Nome da loja" [(ngModel)]="novoUsuario.nomeLoja" maxlength="100">
  <input placeholder="CNPJ" [(ngModel)]="novoUsuario.cnpj" maxlength="14">
  <input placeholder="Email" [(ngModel)]="novoUsuario.email" maxlength="150">
  <input type="password" placeholder="Senha" [(ngModel)]="novoUsuario.senha" maxlength="50">
  <input placeholder="Telefone" [(ngModel)]="novoUsuario.telefone" maxlength="11">
  <input placeholder="Endereço da loja" [(ngModel)]="novoUsuario.endereco" maxlength="200">

  <button class="btn-cadastro" (click)="cadastrar()">Cadastrar lojista</button>
</div>
