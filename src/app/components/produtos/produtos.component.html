<div class="gerenciar-wrapper">

  <!-- SEÇÃO: FORMULÁRIO -->
  <section class="form-section">
    <h2 class="section-title">{{ editando ? '✏️ Editando Produto' : '➕ Adicionar Produto' }}</h2>

    <form (ngSubmit)="salvarProduto()" class="produto-form">

      <div class="form-row">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" [(ngModel)]="novoProduto.nome" name="nome" placeholder="Nome do produto" required>
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <input type="text" [(ngModel)]="novoProduto.categoria" name="categoria" placeholder="Ex: Roupas, Calçados..." required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Preço (R$)</label>
          <input type="number" [(ngModel)]="novoProduto.preco" name="preco" placeholder="0,00" required>
        </div>
        <div class="form-group">
          <label>Estoque</label>
          <input type="number" [(ngModel)]="novoProduto.estoque" name="estoque" placeholder="Quantidade" required>
        </div>
      </div>

      <div class="form-group">
        <label>URL da Imagem</label>
        <input type="text" [(ngModel)]="novoProduto.imagem" name="imagem" placeholder="https://...">
      </div>

      <div class="form-group">
        <label>Descrição</label>
        <input type="text" [(ngModel)]="novoProduto.descricao" name="descricao" placeholder="Breve descrição do produto">
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-salvar">
          {{ editando ? 'Salvar Alterações' : 'Adicionar Produto' }}
        </button>
        <button type="button" class="btn-cancelar" *ngIf="editando" (click)="resetarFormulario()">
          Cancelar
        </button>
      </div>

    </form>
  </section>

  <!-- SEÇÃO: LISTA DE PRODUTOS -->
  <section class="lista-section">
    <h2 class="section-title">📦 Meus Produtos</h2>

    <div *ngIf="produtos.length > 0; else semProdutos" class="produtos-grid">
      <div *ngFor="let produto of produtos" class="produto-card">

        <img [src]="produto.imagem" [alt]="produto.nome" class="produto-img">

        <div class="produto-info">
          <h3 class="produto-nome">{{ produto.nome }}</h3>
          <span class="produto-categoria">{{ produto.categoria }}</span>
          <p class="produto-descricao">{{ produto.descricao }}</p>

          <div class="produto-detalhes">
            <span class="preco">R$ {{ produto.preco }}</span>
            <span class="estoque">Estoque: {{ produto.estoque }}</span>
          </div>

          <div class="produto-acoes"
            *ngIf="usuarioLogado?.tipo === 'lojista' && produto.lojistaId === usuarioLogado?.id">
            <button class="btn btn-editar" (click)="editarProduto(produto)">Editar</button>
            <button class="btn btn-excluir" (click)="removerProduto(produto.id!)">Excluir</button>
          </div>
        </div>

      </div>
    </div>

    <ng-template #semProdutos>
      <p class="sem-produtos">Nenhum produto cadastrado ainda.</p>
    </ng-template>
  </section>

</div>
